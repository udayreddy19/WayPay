version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: waypay-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-waypay}
      POSTGRES_USER: ${POSTGRES_USER:-waypay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-waypay_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-waypay}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - waypay-network

  redis:
    image: redis:7-alpine
    container_name: waypay-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-waypay_redis}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-waypay_redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - waypay-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: waypay-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@waypay.in}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - waypay-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  waypay-network:
    driver: bridge
